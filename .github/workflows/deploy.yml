name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: asia-northeast1
  REGISTRY: asia-northeast1-docker.pkg.dev
  BACKEND_SERVICE: edufx-backend
  FRONTEND_SERVICE: edufx-frontend
  REPO: edufx

jobs:
  # ── 1. Build + deploy FastAPI backend ──────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push backend image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker build -t $IMAGE ./server
          docker push $IMAGE

      - name: Deploy backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --service-account=edufx-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=global
            DATA_BACKEND=supabase
            DEMO_MODE=false
            VERTEX_MODEL=gemini-2.5-flash
            EMBEDDING_MODEL=gemini-embedding-001
            EMBEDDING_DIMENSIONS=384
            FINETUNED_MODEL_URL=${{ secrets.FINETUNED_MODEL_URL }}
            FINETUNED_MODEL_NAME=edufx

  # ── 2. Build + deploy Next.js frontend ────────────────────────────────────
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push frontend image
        run: |
          ANON_KEY="$(gcloud secrets versions access latest --secret=edufx-supabase-anon-key --project=${{ secrets.GCP_PROJECT_ID }})"
          if [ -z "$ANON_KEY" ]; then
            echo "Missing Supabase anon key from Secret Manager"
            exit 1
          fi
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          docker build \
            -f client/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ needs.deploy-backend.outputs.url }} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY" \
            --build-arg NEXT_PUBLIC_SKIP_LOGIN=false \
            -t $IMAGE \
            .
          docker push $IMAGE

      - name: Deploy frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --service-account=edufx-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Print deployed URLs
        run: |
          echo "Backend:  ${{ needs.deploy-backend.outputs.url }}"
          echo "Frontend: ${{ steps.deploy.outputs.url }}"

  sync-backend-origin:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Update backend CORS origin
        run: |
          gcloud run services update ${{ env.BACKEND_SERVICE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --update-env-vars FRONTEND_ORIGIN=${{ needs.deploy-frontend.outputs.url }}
